<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <!-- WeChat / Open Graph sharing -->
    <meta property="og:title" content="Pixel Snake - Game Boy 风格贪吃蛇">
    <meta property="og:description" content="经典 Game Boy 像素风贪吃蛇，支持世界排行榜！">
    <meta property="og:type" content="website">
    <title>Pixel Snake Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-wrapper">
        <!-- Game Boy Shell -->
        <div class="gameboy-shell">
            <div class="gameboy-header">DOT MATRIX WITH STEREO SOUND</div>
            <div class="screen-bezel">
                <canvas id="gameCanvas" width="320" height="320"></canvas>

                <!-- Pause Overlay -->
                <div id="pause-overlay">
                    <div class="pause-text">PAUSED</div>
                    <div class="pause-hint" data-i18n="pause-hint">按 B 或 START 继续</div>
                </div>

                <!-- Start Menu Overlay -->
                <div id="menu-screen" class="overlay">
                    <div class="menu-title">🐍 PIXEL SNAKE</div>
                    <div id="menu-player-info" class="player-info"></div>

                    <!-- Stats bubble (shown when player has records) -->
                    <div id="menu-stats-bubble" class="stats-bubble" style="display:none"></div>

                    <div class="mode-btn-row">
                        <button id="btn-standard" class="menu-btn mode-btn">
                            <span data-i18n="mode-standard">🏆 标准模式</span>
                        </button>
                        <span class="mode-info-icon" id="info-standard" title="">❓</span>
                    </div>
                    <div class="mode-btn-row">
                        <button id="btn-wild" class="menu-btn mode-btn menu-btn-secondary">
                            <span data-i18n="mode-wild">🎮 狂野模式</span>
                        </button>
                        <span class="mode-info-icon" id="info-wild" title="">❓</span>
                    </div>

                    <!-- Mode info tooltip (hidden by default) -->
                    <div id="mode-info-popup" class="mode-info-popup" style="display:none">
                        <div id="mode-info-text" class="mode-info-text"></div>
                        <button id="mode-info-close" class="mode-info-close">✕</button>
                    </div>

                    <button id="btn-leaderboard" class="menu-btn menu-btn-secondary" data-i18n="leaderboard-btn">🏆 世界排行</button>
                    <button id="btn-settings" class="menu-btn menu-btn-secondary" data-i18n="settings-btn">⚙ 设置</button>
                    <div class="menu-hint" data-i18n="menu-hint">D-pad / 键盘 / 触屏滑动控制方向</div>
                </div>

                <!-- Nickname Input Overlay -->
                <div id="nickname-panel" class="overlay" style="display:none">
                    <div class="settings-title" data-i18n="set-nickname">👤 设置昵称</div>
                    <div class="setting-row">
                        <label data-i18n="your-name">你的名字 (最多16字)</label>
                        <input type="text" id="input-nickname" maxlength="16" placeholder="Anonymous" class="text-input" data-i18n="name-placeholder" data-i18n-attr="placeholder">
                    </div>
                    <button id="btn-save-nick" class="menu-btn" data-i18n="confirm">✓ 确认</button>
                    <button id="btn-cancel-nick" class="menu-btn menu-btn-secondary" data-i18n="back">← 返回</button>
                </div>

                <!-- Leaderboard Overlay -->
                <div id="leaderboard-panel" class="overlay" style="display:none">
                    <div class="settings-title" data-i18n="world-leaderboard">🏆 世界排行榜</div>
                    <div id="leaderboard-list" class="leaderboard-list">
                        <div class="lb-loading" data-i18n="loading">加载中...</div>
                    </div>
                    <div id="my-rank" class="my-rank"></div>
                    <button id="btn-lb-back" class="menu-btn" data-i18n="back">← 返回</button>
                </div>

                <!-- Game Over Overlay -->
                <div id="gameover-panel" class="overlay" style="display:none">
                    <div class="gameover-title">GAME OVER</div>
                    <div id="gameover-score" class="gameover-score"></div>
                    <div id="gameover-rank" class="gameover-rank"></div>
                    <div id="gameover-best" class="gameover-best"></div>
                    <button id="btn-restart" class="menu-btn" data-i18n="play-again">▶ 再来一局</button>
                    <button id="btn-go-settings" class="menu-btn menu-btn-secondary" data-i18n="go-settings">⚙ 设置</button>
                    <button id="btn-go-home" class="menu-btn menu-btn-secondary" data-i18n="go-home">🏠 回到首页</button>
                </div>

                <!-- Settings Panel Overlay -->
                <div id="settings-panel" class="overlay" style="display:none">
                    <div class="settings-title" data-i18n="settings-title">⚙ 设置</div>
                    
                    <div class="setting-row wild-only-setting" id="row-size">
                        <label data-i18n="screen-size">屏幕尺寸</label>
                        <select id="setting-size">
                            <option value="256x256" data-i18n="size-256">小 (256×256)</option>
                            <option value="320x320" selected data-i18n="size-320">中 (320×320)</option>
                            <option value="480x480" data-i18n="size-480">大 (480×480)</option>
                            <option value="640x640" data-i18n="size-640">超大 (640×640)</option>
                        </select>
                    </div>

                    <div class="setting-row wild-only-setting" id="row-speed">
                        <label data-i18n="game-speed">游戏速度</label>
                        <select id="setting-speed">
                            <option value="160" data-i18n="speed-160">慢速</option>
                            <option value="120" selected data-i18n="speed-120">正常</option>
                            <option value="80" data-i18n="speed-80">快速</option>
                            <option value="50" data-i18n="speed-50">地狱</option>
                        </select>
                    </div>

                    <div class="setting-row">
                        <label><span data-i18n="volume">音量</span> <span id="volume-value">50%</span></label>
                        <input type="range" id="setting-volume" min="0" max="1" step="0.05" value="0.5">
                    </div>

                    <div class="setting-row">
                        <label data-i18n="language">语言</label>
                        <select id="setting-lang">
                            <option value="zh" data-i18n="lang-zh">中文</option>
                            <option value="en" data-i18n="lang-en">English</option>
                        </select>
                    </div>

                    <div class="setting-row">
                        <label data-i18n="skin">皮肤</label>
                        <select id="setting-skin">
                            <option value="classic" data-i18n="skin-classic">经典 Game Boy</option>
                            <option value="neon" data-i18n="skin-neon">霓虹</option>
                            <option value="retro" data-i18n="skin-retro">复古 NES</option>
                            <option value="dark" data-i18n="skin-dark">暗黑</option>
                            <option value="ocean" data-i18n="skin-ocean">海洋</option>
                        </select>
                    </div>

                    <button id="btn-back" class="menu-btn" data-i18n="back">← 返回</button>
                </div>
            </div>

            <!-- Game Boy Controls -->
            <div class="gb-controls">
                <!-- D-Pad -->
                <div class="dpad-container">
                    <div class="dpad">
                        <button class="dpad-btn dpad-up" id="dpad-up" aria-label="Up">▲</button>
                        <button class="dpad-btn dpad-left" id="dpad-left" aria-label="Left">◀</button>
                        <div class="dpad-center"></div>
                        <button class="dpad-btn dpad-right" id="dpad-right" aria-label="Right">▶</button>
                        <button class="dpad-btn dpad-down" id="dpad-down" aria-label="Down">▼</button>
                    </div>
                </div>

                <!-- A B Buttons -->
                <div class="ab-container">
                    <div class="ab-buttons">
                        <div class="ab-btn-wrap">
                            <button class="gb-round-btn btn-b" id="btn-B" aria-label="B">B</button>
                            <span class="ab-label" data-i18n="btn-pause">暂停</span>
                        </div>
                        <div class="ab-btn-wrap">
                            <button class="gb-round-btn btn-a" id="btn-A" aria-label="A">A</button>
                            <span class="ab-label" data-i18n="btn-boost">加速</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SELECT / START -->
            <div class="ss-container">
                <div class="ss-btn-wrap">
                    <button class="ss-btn" id="btn-SELECT" aria-label="Select"></button>
                    <span class="ss-label">SELECT</span>
                </div>
                <div class="ss-btn-wrap">
                    <button class="ss-btn" id="btn-START" aria-label="Start"></button>
                    <span class="ss-label">START</span>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/i18n.js"></script>
    <script src="js/utils/spritesheet.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/food.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
